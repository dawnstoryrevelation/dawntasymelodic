                    }, 1500);
                 }
             }
         }

        function populateShop() {
             shopItemContainer.innerHTML = ''; // Clear previous
             // Example: Add shop items (currently just placeholder text)
             shopItems.forEach(item => {
                  const card = document.createElement('div');
                 card.classList.add('item-card');
                 if (purchasedItems.includes(item.id)) card.classList.add('selected'); // Show if purchased

                 // Placeholder visual
                  const preview = document.createElement('div');
                  preview.style.width = '60px'; preview.style.height = '60px';
                  preview.style.backgroundColor = '#444'; preview.style.borderRadius = '4px';
                  preview.style.display = 'flex'; preview.style.alignItems='center'; preview.style.justifyContent='center';
                  preview.style.fontSize = '10px'; preview.textContent = item.type.toUpperCase();

                 const name = document.createElement('div');
                 name.classList.add('item-name');
                 name.textContent = item.name;

                 const cost = document.createElement('div');
                 cost.classList.add('item-cost');
                  if (purchasedItems.includes(item.id)) {
                      cost.textContent = 'Owned';
                      cost.style.color = '#7f7';
                  } else {
                     cost.textContent = `💰 ${item.cost}`;
                     card.onclick = () => tryBuyShopItem(item);
                 }

                 card.appendChild(preview);
                 card.appendChild(name);
                 card.appendChild(cost);
                 shopItemContainer.appendChild(card);
             });
              if (shopItems.length === 0) {
                 shopItemContainer.innerHTML = '<div class="screenText">More items coming soon!</div>';
              }
        }

         function tryBuyShopItem(item) {
             if (purchasedItems.includes(item.id)) return;

             if (totalCoins >= item.cost) {
                 totalCoins -= item.cost;
                 purchasedItems.push(item.id);
                 playSound('purchase_success');
                 saveData();
                 updateCoinDisplay();
                 populateShop(); // Update shop UI
                 // Apply cosmetic effect if applicable (needs implementation)
                 // applyCosmetic(item.id);
             } else {
                 playSound('purchase_fail');
                 // Optional: Show "Not enough coins" message
             }
         }

        // --- Event Listeners ---
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseleave', () => { keys.left = false; keys.right = false; });
        canvas.addEventListener('touchstart', handleTouchMove, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('touchcancel', handleTouchEnd);

        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
        charSelectButton.addEventListener('click', () => switchState('charSelect'));
        shopButton.addEventListener('click', () => switchState('shop'));

         // Back buttons
         backToMenuButtonGO.addEventListener('click', () => switchState('menu'));
         backToMenuButtonCS.addEventListener('click', () => switchState('menu'));
         backToMenuButtonShop.addEventListener('click', () => switchState('menu'));

          // Character select confirm (optional, could just select onClick)
         charSelectConfirmButton.addEventListener('click', () => {
              // Already selected via selectCharacter, just go back
              switchState('menu');
          });


        window.addEventListener('resize', () => initGame(true)); // Re-init on resize

        // --- Initial Setup ---
        initGame(false); // Load data, setup initial state
        switchState('menu'); // Start at the main menu

    </script>
</body>
