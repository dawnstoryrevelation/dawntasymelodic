# netlify.toml (Attempt 2: Base directory='ai', Publish='.')

[build]
  command = "echo 'Building functions from functions directory only (base=ai)'"
  functions = "functions"         # Relative to base 'ai' -> finds 'ai/functions'
  # ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼
  publish = "."                 # Tell Netlify the base 'ai' IS the publish dir (it won't find much to publish)
  # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

[build.environment]
  NODE_VERSION = "18"

# --- Keep your existing headers and redirects below ---
[[headers]]
  for = "/.netlify/functions/*"
  # ... your CORS headers ...

# ... [rest of your headers/redirects] ...